<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#1e293b"/>
      <stop offset="1" stop-color="#0f172a"/>
    </linearGradient>
    <linearGradient id="bars" x1="0" y1="1" x2="0" y2="0">
      <stop offset="0" stop-color="#22c55e"/>
      <stop offset="0.55" stop-color="#eab308"/>
      <stop offset="1" stop-color="#f97316"/>
    </linearGradient>
  </defs>

  <rect x="8" y="8" width="496" height="496" rx="96" fill="url(#bg)"/>
  <rect x="8" y="8" width="496" height="496" rx="96" fill="none" stroke="#334155" stroke-width="4"/>

  <!-- activity / process pulse line -->
  <polyline points="88,208 168,208 196,140 232,288 264,176 296,236 328,208 424,208"
            fill="none" stroke="#38bdf8" stroke-width="20"
            stroke-linecap="round" stroke-linejoin="round"/>

  <!-- per-process usage bars -->
  <rect x="120" y="330" width="42" height="96" rx="8" fill="url(#bars)"/>
  <rect x="184" y="300" width="42" height="126" rx="8" fill="url(#bars)"/>
  <rect x="248" y="352" width="42" height="74" rx="8" fill="url(#bars)"/>
  <rect x="312" y="316" width="42" height="110" rx="8" fill="url(#bars)"/>
  <rect x="376" y="360" width="42" height="66" rx="8" fill="url(#bars)"/>
</svg>